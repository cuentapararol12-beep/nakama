<!DOCTYPE html>
<html lang="es" data-theme="rosa" data-layout="rpg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nakama no Mi - Constructor de Personaje</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --radius-lg: 16px; --radius: 12px; --radius-sm: 8px;
  --font-display: 'Cinzel Decorative', serif;
  --font-heading: 'Cinzel', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="rosa"] {
  --bg-overlay: rgba(60,10,28,0.82);
  --panel-bg: rgba(92,31,55,0.88);
  --panel-bg-hover: rgba(119,42,68,0.95);
  --panel-border: #7A2746;
  --panel-border-bright: #E34B7F;
  --glass-bg: rgba(92,31,55,0.75);
  --accent-primary: #F25C8D;
  --accent-secondary: #F7A1B8;
  --accent-glow: rgba(242,92,141,0.4);
  --accent-alpha: rgba(242,92,141,0.15);
  --text-main: #E6D3B3;
  --text-muted: #8A7F73;
  --text-bright: #ffffff;
  --stat-good: #4ade80;
  --stat-bad: #fb7185;
  --stat-warn: #facc15;
  --stat-magic: #e879f9;
  --stat-vit: #fb7185;
  --stat-ene: #60a5fa;
  --stat-esp: #c084fc;
  --shadow-sm: 0 4px 16px rgba(60,10,28,0.5);
  --shadow-lg: 0 12px 40px rgba(60,10,28,0.8);
  --good-bg: rgba(74,222,128,0.1);
  --bad-bg: rgba(251,113,133,0.1);
  --bar-vit: linear-gradient(90deg,#7A2746,#fb7185);
  --bar-ene: linear-gradient(90deg,#1e3a8a,#60a5fa);
  --bar-esp: linear-gradient(90deg,#4c1d95,#c084fc);
  --scrollbar: #7A2746;
}
[data-theme="azul"] {
  --bg-overlay: rgba(4,6,11,0.88);
  --panel-bg: rgba(16,24,40,0.90);
  --panel-bg-hover: rgba(20,31,48,0.97);
  --panel-border: #1e2a3e;
  --panel-border-bright: #2a3b57;
  --glass-bg: rgba(16,24,40,0.75);
  --accent-primary: #c9a227;
  --accent-secondary: #f0cf6e;
  --accent-glow: rgba(201,162,39,0.35);
  --accent-alpha: rgba(201,162,39,0.12);
  --text-main: #c8bfa8;
  --text-muted: #8b8372;
  --text-bright: #ffffff;
  --stat-good: #00e5cc;
  --stat-bad: #ff4757;
  --stat-warn: #ffa502;
  --stat-magic: #a55eea;
  --stat-vit: #ff6b81;
  --stat-ene: #70a1ff;
  --stat-esp: #a55eea;
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.7);
  --good-bg: rgba(0,229,204,0.1);
  --bad-bg: rgba(255,71,87,0.1);
  --bar-vit: linear-gradient(90deg,#8b0000,#ff4757);
  --bar-ene: linear-gradient(90deg,#004d40,#00e5cc);
  --bar-esp: linear-gradient(90deg,#4a0080,#a55eea);
  --scrollbar: #1e2a3e;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--text-main);min-height:100vh;overflow-x:hidden;background-image:url('https://i.imgur.com/0ZZoQTF.png');background-repeat:repeat;background-size:auto;background-attachment:fixed;position:relative;}
body::before{content:'';position:fixed;inset:0;background:var(--bg-overlay);z-index:0;transition:background 0.5s ease;}
body>*{position:relative;z-index:1;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent-primary);}
[data-tip]{position:relative;cursor:help;border-bottom:1px dotted var(--accent-primary);display:inline-block;}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:var(--panel-bg);color:var(--text-bright);border:1px solid var(--accent-primary);box-shadow:var(--shadow-lg);padding:8px 12px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.72rem;white-space:pre-wrap;width:max-content;max-width:280px;z-index:9999;pointer-events:none;text-align:center;}
.card{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);backdrop-filter:blur(10px);transition:var(--transition);}
.card-title{font-family:var(--font-heading);font-size:0.85rem;font-weight:700;color:var(--accent-secondary);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;gap:8px;}
.btn{background:transparent;border:1px solid var(--panel-border-bright);color:var(--text-main);font-family:var(--font-heading);font-size:0.72rem;font-weight:600;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.btn:hover{background:rgba(255,255,255,0.05);color:var(--text-bright);}
.btn-primary{border-color:var(--accent-primary);color:var(--accent-primary);background:var(--accent-alpha);}
.btn-primary:hover{background:var(--accent-primary);color:#fff;box-shadow:0 0 15px var(--accent-glow);}
.btn-danger{border-color:var(--stat-bad);color:var(--stat-bad);}
.btn-danger:hover{background:var(--stat-bad);color:#fff;}
input[type="text"],input[type="number"],select{background:rgba(0,0,0,0.25);border:1px solid var(--panel-border);color:var(--text-bright);font-family:var(--font-mono);font-size:0.85rem;padding:8px 12px;border-radius:var(--radius-sm);outline:none;width:100%;transition:var(--transition);}
input:focus,select:focus{border-color:var(--accent-primary);box-shadow:0 0 10px var(--accent-glow);}
.toggle-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;margin:6px 0;}
.toggle-wrap input{display:none;}
.toggle{width:40px;height:20px;background:rgba(0,0,0,0.4);border:1px solid var(--panel-border);border-radius:10px;position:relative;transition:var(--transition);flex-shrink:0;}
.toggle::after{content:'';position:absolute;top:1px;left:2px;width:16px;height:16px;background:var(--text-muted);border-radius:50%;transition:var(--transition);}
.toggle-wrap input:checked + .toggle{background:var(--good-bg);border-color:var(--stat-good);}
.toggle-wrap input:checked + .toggle::after{transform:translateX(20px);background:var(--stat-good);box-shadow:0 0 8px var(--stat-good);}
.toggle-label{font-size:0.8rem;font-weight:500;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-family:var(--font-mono);font-size:0.8rem;border-bottom:1px dashed rgba(255,255,255,0.05);}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text-muted);}
.info-val{color:var(--text-bright);font-weight:600;text-align:right;}
.info-val.good{color:var(--stat-good);text-shadow:0 0 8px var(--stat-good);}
.info-val.bad{color:var(--stat-bad);}
.info-val.warn{color:var(--stat-warn);}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-family:var(--font-mono);font-size:0.65rem;font-weight:600;background:var(--panel-bg);border:1px solid var(--panel-border);margin:2px;}
.badge.gold{border-color:var(--accent-primary);color:var(--accent-primary);}
.badge.green{border-color:var(--stat-good);color:var(--stat-good);}
.badge.red{border-color:var(--stat-bad);color:var(--stat-bad);}
.badge.purple{border-color:var(--stat-magic);color:var(--stat-magic);}
.badge.blue{border-color:var(--stat-ene);color:var(--stat-ene);}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:rgba(0,0,0,0.18);border:1px solid var(--panel-border);border-radius:var(--radius-sm);margin-bottom:7px;cursor:pointer;transition:var(--transition);}
.list-item:hover{border-color:var(--accent-primary);background:rgba(0,0,0,0.35);}
.list-item.selected,.list-item.sel-pos{border-color:var(--stat-good);background:var(--good-bg);}
.list-item.sel-neg{border-color:var(--stat-bad);background:var(--bad-bg);}
.list-item.sel-race{border-color:var(--accent-primary);background:var(--accent-alpha);box-shadow:0 0 12px var(--accent-glow);}
.list-title{font-family:var(--font-heading);font-weight:700;color:var(--text-bright);font-size:0.82rem;margin-bottom:2px;}
.list-desc{font-size:0.7rem;color:var(--text-muted);line-height:1.3;}
.rpg-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.75rem;margin-top:10px;}
.rpg-table th{color:var(--accent-secondary);font-weight:600;padding:8px;text-align:left;border-bottom:1px solid var(--panel-border-bright);background:rgba(0,0,0,0.3);}
.rpg-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-muted);}
.stat-tag{padding:3px 7px;border-radius:4px;font-family:var(--font-mono);font-size:0.65rem;font-weight:600;}
.stat-tag.pos{background:rgba(74,222,128,0.1);color:var(--stat-good);border:1px solid rgba(74,222,128,0.3);}
.stat-tag.neg{background:rgba(251,113,133,0.1);color:var(--stat-bad);border:1px solid rgba(251,113,133,0.3);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
header{background:var(--panel-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--panel-border);padding:0 24px;display:flex;justify-content:space-between;align-items:center;height:64px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow-lg);}
.logo{font-family:var(--font-display);font-size:1.3rem;font-weight:900;color:var(--accent-primary);letter-spacing:2px;text-shadow:0 0 20px var(--accent-glow);}
.logo em{color:var(--accent-secondary);font-style:normal;}
.header-center{display:flex;align-items:center;gap:8px;}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.layout-pill{display:flex;background:rgba(0,0,0,0.3);border:1px solid var(--panel-border-bright);border-radius:20px;overflow:hidden;padding:3px;gap:2px;}
.layout-pill button{border:none;border-radius:16px;padding:5px 14px;font-family:var(--font-heading);font-size:0.65rem;font-weight:700;cursor:pointer;transition:var(--transition);text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);background:transparent;}
.layout-pill button.active{background:var(--accent-primary);color:#fff;box-shadow:0 0 12px var(--accent-glow);}
.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid var(--panel-border-bright);display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--transition);}
.theme-dot:hover{border-color:var(--accent-primary);transform:scale(1.15);}
.rpg-layout{display:grid;grid-template-columns:300px 1fr 340px;gap:16px;padding:16px;max-width:1700px;margin:0 auto;align-items:start;}
.col-left,.col-right{position:sticky;top:80px;max-height:calc(100vh - 100px);overflow-y:auto;padding-right:4px;}
.col-center{display:flex;flex-direction:column;gap:14px;padding-right:4px;}
.classic-layout{max-width:1340px;margin:0 auto;padding:16px 20px 80px;}
.nav-tabs{display:flex;gap:4px;border-bottom:2px solid var(--panel-border);padding-bottom:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10;background:var(--panel-bg);backdrop-filter:blur(8px);border-radius:var(--radius-sm) var(--radius-sm) 0 0;padding:8px 8px 8px 8px;margin-bottom:0;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{background:transparent;border:none;color:var(--text-muted);font-family:var(--font-heading);font-size:0.68rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);white-space:nowrap;flex-shrink:0;}
.nav-tab:hover{background:var(--panel-bg-hover);color:var(--text-bright);}
.nav-tab.active{background:var(--accent-alpha);color:var(--accent-primary);border:1px solid var(--accent-primary);box-shadow:inset 0 0 10px var(--accent-glow);}
.nav-tab.rb-tab{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);color:var(--stat-good);}
.nav-tab.rb-tab.active{background:rgba(74,222,128,0.18);border-color:var(--stat-good);box-shadow:inset 0 0 10px rgba(74,222,128,0.2);}
.tab-content{display:none;animation:fadeIn 0.3s ease;padding-top:14px;}
.tab-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.tabs-wrapper{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);}
.tabs-body{padding:0 16px 16px;}
.attr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.attr-card{background:rgba(0,0,0,0.2);border:1px solid var(--panel-border);border-radius:var(--radius-sm);padding:12px 8px;display:flex;flex-direction:column;align-items:center;transition:var(--transition);text-align:center;gap:4px;}
.attr-card:hover{border-color:var(--accent-primary);background:rgba(0,0,0,0.35);transform:translateY(-2px);}
.attr-icon{font-size:1.5rem;color:var(--accent-secondary);width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.attr-name{font-family:var(--font-heading);color:var(--text-bright);font-weight:700;font-size:0.82rem;letter-spacing:1px;}
.attr-breakdown{font-family:var(--font-mono);font-size:0.58rem;color:var(--text-muted);background:rgba(0,0,0,0.25);border-radius:4px;padding:4px;width:100%;margin:3px 0;}
.attr-total{font-family:var(--font-mono);font-size:1.8rem;font-weight:700;color:var(--accent-secondary);line-height:1;text-shadow:0 0 10px rgba(0,0,0,0.5);}
.attr-controls{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;}
.attr-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--panel-border-bright);background:var(--panel-bg);color:var(--text-main);font-size:0.85rem;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;}
.attr-btn:hover{background:var(--accent-primary);color:#fff;border-color:var(--accent-primary);}
.attr-input{width:38px;text-align:center;padding:3px;font-size:0.85rem;border-color:var(--panel-border-bright);}
.identity-input{font-family:var(--font-display) !important;font-size:1.4rem !important;text-align:center;border:none !important;border-bottom:2px solid var(--accent-primary) !important;background:transparent !important;color:var(--accent-primary) !important;padding:4px !important;border-radius:0 !important;margin-bottom:10px;font-weight:700;}
.level-wrapper{display:flex;align-items:center;justify-content:center;gap:16px;margin:12px 0;}
.lvl-btn{width:32px;height:32px;border-radius:50%;cursor:pointer;background:var(--panel-bg);border:1px solid var(--accent-primary);color:var(--accent-primary);display:flex;align-items:center;justify-content:center;transition:var(--transition);font-size:1rem;}
.lvl-btn:hover{background:var(--accent-primary);color:#fff;box-shadow:0 0 10px var(--accent-glow);}
.lvl-display{text-align:center;}
.lvl-num{font-family:var(--font-mono);font-size:2.8rem;font-weight:900;color:var(--accent-secondary);line-height:1;}
.lvl-lbl{font-family:var(--font-heading);font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;}
.rpg-bar{margin-bottom:12px;}
.rpg-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-family:var(--font-heading);font-size:0.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.rpg-bar-val{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;}
.rpg-bar-bg{height:8px;background:rgba(0,0,0,0.4);border-radius:4px;overflow:hidden;}
.rpg-bar-fill{height:100%;width:100%;border-radius:4px;transition:width 0.5s ease;}
.bar-vit .rpg-bar-header,.bar-vit .rpg-bar-val{color:var(--stat-vit);}
.bar-vit .rpg-bar-fill{background:var(--bar-vit);box-shadow:0 0 8px var(--stat-vit);}
.bar-ene .rpg-bar-header,.bar-ene .rpg-bar-val{color:var(--stat-ene);}
.bar-ene .rpg-bar-fill{background:var(--bar-ene);box-shadow:0 0 8px var(--stat-ene);}
.bar-esp .rpg-bar-header,.bar-esp .rpg-bar-val{color:var(--stat-esp);}
.bar-esp .rpg-bar-fill{background:var(--bar-esp);box-shadow:0 0 8px var(--stat-esp);}
.regen-text{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-align:right;margin-top:2px;}
.pa-display{text-align:center;padding-top:14px;border-top:1px dashed var(--panel-border);margin-top:14px;}
.pa-num{font-family:var(--font-mono);font-size:2.8rem;font-weight:900;color:var(--stat-good);text-shadow:0 0 15px rgba(74,222,128,0.3);line-height:1;}
.pa-lbl{font-family:var(--font-heading);font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;}
.radar-box{display:flex;justify-content:center;align-items:center;margin-bottom:10px;padding:8px;background:radial-gradient(circle at center,rgba(0,0,0,0.3) 0%,transparent 70%);border-radius:50%;}
.bbcode-panel{background:rgba(0,0,0,0.3);border:1px solid var(--panel-border-bright);border-radius:var(--radius);padding:16px;margin-top:10px;}
.bbcode-text{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.2);padding:10px;border-radius:var(--radius-sm);border:1px solid var(--panel-border);margin-bottom:10px;}
.btn-bbcode{background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));border:none;color:#fff;font-family:var(--font-heading);font-size:0.78rem;font-weight:700;padding:10px 20px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px var(--accent-glow);text-transform:uppercase;letter-spacing:1px;}
.btn-bbcode:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--accent-glow);}
.btn-bbcode.copied{background:linear-gradient(135deg,var(--stat-good),#22c55e);}
.mastery-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--panel-border);cursor:pointer;transition:var(--transition);}
.mastery-dot.filled{background:var(--accent-primary);border-color:var(--accent-primary);box-shadow:0 0 6px var(--accent-glow);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:9999;justify-content:center;align-items:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--panel-bg);border:1px solid var(--accent-primary);border-radius:var(--radius-lg);padding:24px;width:90%;max-width:560px;box-shadow:var(--shadow-lg);}
.modal-title{font-family:var(--font-heading);font-size:1rem;color:var(--accent-secondary);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-box textarea{width:100%;height:220px;background:rgba(0,0,0,0.4);color:var(--text-bright);border:1px solid var(--panel-border);border-radius:var(--radius-sm);padding:12px;font-family:var(--font-mono);font-size:0.75rem;outline:none;resize:none;margin-bottom:14px;}
.modal-box textarea:focus{border-color:var(--accent-primary);}
.umbral-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;font-family:var(--font-mono);font-size:0.72rem;border-bottom:1px dashed rgba(255,255,255,0.04);}
.umbral-row:last-child{border-bottom:none;}
.big-vitals{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.big-vital{text-align:center;padding:20px 14px;background:var(--panel-bg);border:1px solid;border-radius:var(--radius-lg);backdrop-filter:blur(10px);}
.big-vital-val{font-family:var(--font-mono);font-size:2.2rem;font-weight:700;line-height:1;margin:8px 0;}
.big-vital-lbl{font-family:var(--font-heading);font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;}
.big-vital-regen{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);}
.bv-vit{border-color:rgba(251,113,133,0.4);}.bv-vit .big-vital-val,.bv-vit .big-vital-lbl{color:var(--stat-vit);}
.bv-ene{border-color:rgba(96,165,250,0.4);}.bv-ene .big-vital-val,.bv-ene .big-vital-lbl{color:var(--stat-ene);}

.dashboard-hero{background:var(--glass-bg);backdrop-filter:blur(14px);border:1px solid var(--panel-border-bright);border-radius:var(--radius-lg);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;box-shadow:var(--shadow-lg);margin-bottom:20px;flex-wrap:wrap;}
.dash-circle{display:flex;flex-direction:column;align-items:center;gap:8px;}
.dash-circle-wrap{width:68px;height:68px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);border:2px solid var(--accent-primary);border-radius:50%;box-shadow:0 0 18px var(--accent-glow);position:relative;}
.dash-circle-val{font-family:var(--font-mono);font-size:1.7rem;font-weight:700;color:var(--accent-secondary);}
.dash-circle-lbl{font-family:var(--font-heading);font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.dash-name-input{font-family:var(--font-display) !important;font-size:1.3rem !important;border:none !important;border-bottom:2px solid var(--accent-primary) !important;background:transparent !important;color:var(--accent-primary) !important;padding:4px !important;border-radius:0 !important;font-weight:700;min-width:200px;}
.resumen-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.resumen-section{background:rgba(0,0,0,0.2);border:1px solid var(--panel-border);border-radius:var(--radius);padding:16px;}
.resumen-section-title{font-family:var(--font-heading);font-size:0.72rem;font-weight:700;color:var(--accent-secondary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--panel-border);}
.stat-highlight{background:rgba(0,0,0,0.3);border-radius:var(--radius-sm);padding:12px 16px;text-align:center;border:1px solid var(--panel-border);}
.stat-highlight-val{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;line-height:1;}
.stat-highlight-lbl{font-family:var(--font-heading);font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-top:4px;}
.akuma-type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.akuma-type-card{background:rgba(0,0,0,0.2);border:1px solid var(--panel-border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:var(--transition);}
.akuma-type-card:hover{border-color:var(--accent-primary);background:rgba(0,0,0,0.35);}
.akuma-type-card.selected{border-color:var(--accent-primary);background:var(--accent-alpha);box-shadow:0 0 12px var(--accent-glow);}
.akuma-type-card.logia.selected{border-color:var(--stat-ene);background:rgba(96,165,250,0.1);}
.akuma-type-card.paramecia.selected{border-color:var(--stat-good);background:rgba(74,222,128,0.1);}
.akuma-type-card.zoan.selected{border-color:var(--stat-warn);background:rgba(250,204,21,0.1);}
.akuma-type-icon{font-size:1.5rem;margin-bottom:6px;color:var(--accent-secondary);}
.akuma-type-name{font-family:var(--font-heading);font-size:0.75rem;font-weight:700;color:var(--text-bright);}
.akuma-type-desc{font-size:0.62rem;color:var(--text-muted);margin-top:4px;}
.zoan-sub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.speed-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-family:var(--font-mono);font-size:0.75rem;border-bottom:1px dashed rgba(255,255,255,0.04);}
.speed-row:last-child{border-bottom:none;}
.ref-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 8px;border-bottom:1px dashed rgba(255,255,255,0.04);font-size:0.68rem;}
.ref-row:last-child{border-bottom:none;}
.section-divider{font-family:var(--font-heading);font-size:0.7rem;color:var(--accent-secondary);text-transform:uppercase;letter-spacing:1px;padding:8px 0 6px 0;border-bottom:1px solid var(--panel-border);margin:12px 0 8px 0;display:flex;align-items:center;gap:6px;}

/* ── Road Build styles ── */
.rb-table{min-width:900px;width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:0.68rem;}
.rb-table th{padding:6px 5px;text-align:center;font-weight:600;background:rgba(0,0,0,0.5);position:sticky;top:0;z-index:6;border-bottom:2px solid var(--panel-border-bright);}
.rb-table td{padding:3px 3px;border-bottom:1px solid rgba(255,255,255,0.025);}

.rb-milestone{background:rgba(250,204,21,0.06) !important;}
.rb-current{background:rgba(242,92,141,0.1) !important;}
.rb-input{width:44px;text-align:center;font-size:0.64rem;padding:2px 3px;border-radius:4px;}
.rb-scroll{overflow-x:auto;border:1px solid var(--panel-border);border-radius:var(--radius);}
.rb-section-header{font-family:var(--font-heading);font-size:0.72rem;color:var(--accent-secondary);text-transform:uppercase;letter-spacing:1px;padding:10px 0 6px 0;border-bottom:1px solid var(--panel-border);margin:18px 0 10px 0;display:flex;align-items:center;gap:8px;}
.rb-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-family:var(--font-mono);font-size:0.6rem;}
.rb-legend span{display:flex;align-items:center;gap:4px;}
.rb-legend .dot{width:8px;height:8px;border-radius:50%;}

@media(max-width:1300px){.rpg-layout{grid-template-columns:270px 1fr 310px;}}
@media(max-width:1100px){.rpg-layout{grid-template-columns:1fr;height:auto;}.col-left,.col-right{position:static;max-height:none;}.attr-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.attr-grid{grid-template-columns:repeat(2,1fr);}.grid-2,.grid-3{grid-template-columns:1fr;}.rpg-layout{gap:12px;padding:10px;}.header-center{display:none;}.akuma-type-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.attr-grid{grid-template-columns:1fr 1fr;}.logo{font-size:1rem;}}

<body>

<div class="modal-overlay" id="ioModal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="ioModalTitle"><i class="fas fa-file-export"></i> Datos del Personaje</span>
      <button class="btn" style="border:none;padding:4px;" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <textarea id="ioDataText"></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="ioActionBtn" onclick="executeIO()"><i class="fas fa-check"></i> Aceptar</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">Nakama <em>no Mi</em></div>
  <div class="header-center">
    <div class="layout-pill">
      <button id="btnRPG" onclick="setLayout('rpg')" class="active">RPG</button>
      <button id="btnClassic" onclick="setLayout('classic')">Clasico</button>
    </div>
  </div>
  <div class="header-actions">
    <div class="theme-dot" onclick="toggleTheme()" title="Cambiar tema" id="themeBtn">
      <i class="fas fa-palette" style="font-size:12px;"></i>
    </div>
    <button class="btn" onclick="openModal('import')"><i class="fas fa-file-import"></i> Importar</button>
    <button class="btn btn-primary" onclick="openModal('export')"><i class="fas fa-file-export"></i> Exportar</button>
  </div>
</header>

<div id="layoutWrapper"></div>

<script>

let D = {};
let currentLayout = 'rpg';

let state = {
  name:'', level:1, race:'Humano',
  customAttrs:{FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0},
  passiveExtras:{FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0},
  selectedKarmas:{},
  weapon:{cat:'filo',sub:'Espada / Katana / Lanza / Hacha',tier:0,mode:'normal',shield:'no'},
  akuma:{type:'none',zoanSub:'normal'},
  haki:{busho:false,ken:false,haos:false},
  masteries:[{type:'Cuerpo a Cuerpo',grade:1}],
  oficios:{},
  combatCalc:{transformation:'humano',style:'desarmado'},
  zoanBonuses:{FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0},
  roadBuild:{targetLevel:1,plans:{}}
};

// ============================================================
// MATH ENGINE
// ============================================================
const rnd = x => Math.round(x);

function autoBase(a){
  return (a==='CH'||a==='CA') ? 0 : 3+(state.level-1)*D.config.AUTO_PER_LEVEL;
}
function cval(a){return state.customAttrs[a]||0;}
function getLevelCap(){return state.level*10+50;}
function getRaceBonus(a){const r=D.races[state.race];return r?(r.bonuses[a]||0):0;}

function getKarmaMod(a){
  let m=0;
  for(const[id,sel]of Object.entries(state.selectedKarmas)){
    if(!sel)continue;
    if(id==='tuerto'&&(a==='REF'||a==='PRE'))m-=50;
    if(id==='ciego'&&(a==='PRE'||a==='REF'))m-=100;
    if(id==='mal_oido'&&a==='REF')m-=25;
    if(id==='sordo'&&a==='REF')m-=50;
    if(id==='pierna_amputada'&&a==='AGI')m-=100;
    if(id==='arrepentido'&&a==='VOL')m-=40;
  }
  return m;
}

function getPExtra(a){return(state.passiveExtras&&state.passiveExtras[a])||0;}

function getZoanBonus(a){
  const trans=state.combatCalc?.transformation||'humano';
  if(trans==='humano'||!state.akuma?.type?.startsWith('zoan'))return 0;
  return(state.zoanBonuses&&state.zoanBonuses[a])||0;
}

function getAttr(a){return autoBase(a)+cval(a)+getRaceBonus(a);}
function getEff(a){return getAttr(a)+getKarmaMod(a)+getPExtra(a)+getZoanBonus(a);}

function calcVIT(){
  const F=getEff('FUE'),R=getEff('RES'),Ds=getEff('DES'),A=getEff('AGI'),V=getEff('VOL'),n=state.level;
  return rnd((F*5+R*6+Ds*2+A+V)*(1+n/33.33));
}
function calcENE(){
  const F=getEff('FUE'),R=getEff('RES'),Ds=getEff('DES'),P=getEff('PRE'),
        A=getEff('AGI'),Rf=getEff('REF'),I=getEff('INT'),V=getEff('VOL'),Ca=getEff('CA');
  return Math.floor(F*4+R*5+Ds+P+A+Rf+I*3+V+Ca);
}
function calcESP(){
  const V=getEff('VOL'),C=getEff('CH');
  return rnd(V*3+C*3);
}
function calcPhysRes(){
  const R=getEff('RES');
  if(R>=400)return 300;if(R>=300)return 200;if(R>=100)return 100;if(R>=50)return rnd(R*0.5);return 0;
}
function calcElRes(){
  const R=getEff('RES');
  if(R>=400)return 300;if(R>=300)return 200;if(R>=150)return 100;if(R>=50)return rnd(R*0.5);return 0;
}
function calcGB(){
  const F=getEff('FUE');
  if(F>=300)return F+150;if(F>=150)return F+50;return F;
}
function calcHits(v){
  if(v<=150)return 1;if(v<=300)return 2;if(v<=450)return 3;if(v<=600)return 4;return 5;
}
function totalUsed(){return D.attrs.reduce((s,a)=>s+(state.customAttrs[a]||0),0);}
function freePA(){return D.config.PA_START+state.level*D.config.PA_PER_LEVEL-totalUsed();}
function calcInventorySpaces(){
  const F=getEff('FUE');
  let sp=Math.floor(F/15)*3;
  if(state.selectedKarmas['organizado'])sp+=5;
  if(state.selectedKarmas['bolsillo_magico'])sp+=5;
  if(state.selectedKarmas['desorganizado'])sp-=5;
  return Math.max(0,sp);
}
function calcWeightCapacity(){
  const F=getEff('FUE');
  const tier=D.config.weightTiers.find(t=>F<=t.maxFUE)||D.config.weightTiers[D.config.weightTiers.length-1];
  return rnd(tier.base+(F*F/tier.div));
}
function calcFallHeight(){return rnd(getEff('RES')/5)+1;}
function calcDeathThresholds(){
  const vol=getEff('VOL'),res=getEff('RES'),vit=calcVIT();
  const isBuccaneer=state.race==='Buccaneer';
  const vitDeathMult=isBuccaneer?4:2;
  const umbralBase=Math.floor(vol/150)+1;
  return{vitKO:0,vitIrrec:-vol,vitDeath:-(vol*vitDeathMult),vitBigKO:rnd(vit*0.9),vitBigDeath:vit,eneKO:0,eneDeath:-res,espKO:0,espDeath:-Math.ceil(vol/2),isBuccaneer,umbralBase};
}
function calcUmbralesDolorValues(){
  const vol=getEff('VOL');
  const base=Math.floor(vol/150)+1;
  let buccBonus=0;
  if(state.race==='Buccaneer'){buccBonus=150;if(state.level>=10)buccBonus+=300;if(state.level>=25)buccBonus+=500;}
  return [1,2,3,4,5].map(i=>vol*(base+i-1)+buccBonus);
}
function getAkumaRegen(){
  const t=state.akuma.type,n=state.level;
  if(t==='none')return{c:0,f:0};if(t==='logia')return{c:0,f:0};if(t==='paramecia')return{c:0,f:0};
  if(t==='zoan_normal')return{c:n,f:n*2};if(t==='zoan_pre')return{c:n*2,f:n*3};
  if(t==='zoan_mito')return{c:n*3,f:n*4};return{c:0,f:0};
}
function getZoanEneRegen(n){
  const t=state.akuma.type;
  if(t==='zoan_normal')return{c:n*2,f:n*3};if(t==='zoan_pre')return{c:n*3,f:n*4};
  if(t==='zoan_mito')return{c:n*4,f:n*5};return{c:n,f:n*2};
}
function getBaseEneRegen(){return state.level;}
function getBaseEspRegen(){return(getEff('CH')/6);}
function getAkumaLabel(){
  const t=state.akuma.type;
  if(t==='none')return'Ninguna';if(t==='logia')return'Logia';if(t==='paramecia')return'Paramecia';
  if(t==='zoan_normal')return'Zoan Normal';if(t==='zoan_pre')return'Zoan Prehistorica';return'Zoan Mitologica';
}
function getWeaponStats(){
  const catD=D.weapons[state.weapon.cat];if(!catD)return null;
  const subD=catD.subs[state.weapon.sub];if(!subD)return null;
  const FUE=getEff('FUE'),DES=getEff('DES'),PRE=getEff('PRE');
  let fM=1,dM=1;if(state.weapon.mode.includes('dual')){fM=0.5;dM=0.5;}
  const base=subD.bases[state.weapon.tier]||0,sc=subD.scales;
  let dmg=base;
  if(subD.special==='gloves')dmg=FUE+base+(sc.FUE||0)*FUE;
  else{dmg+=rnd((sc.FUE||0)*FUE*fM);if(subD.usePRE)dmg+=rnd((sc.PRE||0)*PRE+(sc.DES||0)*DES*dM);else dmg+=rnd((sc.DES||0)*DES*dM);}
  const hitsAttr=(subD.special==='gloves')?getEff('AGI'):DES;
  let nH=calcHits(hitsAttr);
  if(state.weapon.shield==='yes')nH=calcHits(Math.max(0,hitsAttr-20));
  if(state.weapon.mode==='dual'&&subD.special!=='gloves')dmg=dmg*2;
  return{name:state.weapon.sub,tier:state.weapon.tier+1,dmg,hits:nH,dpt:dmg*nH};
}
function getKarmaBalance(){
  let b=0;
  [...D.karmasPos,...D.karmasNeg].forEach(k=>{if(state.selectedKarmas[k.id])b+=k.val;});
  return b;
}

// ============================================================
// ROAD BUILD ENGINE
// ============================================================
function rbAutoBase(attr, lv){
  return (attr==='CH'||attr==='CA') ? 0 : 3+(lv-1)*D.config.AUTO_PER_LEVEL;
}
function rbGetRaceKarmaExtra(attr){
  return getRaceBonus(attr)+getKarmaMod(attr)+getPExtra(attr);
}
function rbGetPAAtLevel(attr, lv){
  return (state.roadBuild?.plans[lv]?.[attr]) || 0;
}
function rbGetCumulativePA(attr, upToLv){
  let total=0;
  for(let l=1;l<=upToLv;l++) total+=rbGetPAAtLevel(attr,l);
  return total;
}
function rbTotalInvAtLevel(lv){
  return D.attrs.reduce((s,a)=>s+rbGetPAAtLevel(a,lv),0);
}
function rbTotalInvUpTo(lv){
  return D.attrs.reduce((s,a)=>s+rbGetCumulativePA(a,lv),0);
}
function rbPAAvail(lv){return D.config.PA_START+lv*D.config.PA_PER_LEVEL;}
function rbPAFree(lv){return rbPAAvail(lv)-rbTotalInvUpTo(lv);}
function rbEff(attr, lv){
  return rbAutoBase(attr,lv)+rbGetCumulativePA(attr,lv)+rbGetRaceKarmaExtra(attr);
}
function rbVIT(lv){
  const F=rbEff('FUE',lv),R=rbEff('RES',lv),Ds=rbEff('DES',lv),A=rbEff('AGI',lv),V=rbEff('VOL',lv);
  return rnd((F*5+R*6+Ds*2+A+V)*(1+lv/33.33));
}
function rbENE(lv){
  const F=rbEff('FUE',lv),R=rbEff('RES',lv),Ds=rbEff('DES',lv),P=rbEff('PRE',lv),
        A=rbEff('AGI',lv),Rf=rbEff('REF',lv),I=rbEff('INT',lv),V=rbEff('VOL',lv),Ca=rbEff('CA',lv);
  return Math.floor(F*4+R*5+Ds+P+A+Rf+I*3+V+Ca);
}
function rbESP(lv){return rnd(rbEff('VOL',lv)*3+rbEff('CH',lv)*3);}
function rbGB(lv){
  const F=rbEff('FUE',lv);
  if(F>=300)return F+150;if(F>=150)return F+50;return F;
}
function rbMitF(lv){
  const R=rbEff('RES',lv);
  if(R>=400)return 300;if(R>=300)return 200;if(R>=100)return 100;if(R>=50)return rnd(R*0.5);return 0;
}
function rbMitE(lv){
  const R=rbEff('RES',lv);
  if(R>=400)return 300;if(R>=300)return 200;if(R>=150)return 100;if(R>=50)return rnd(R*0.5);return 0;
}
function rbDeath(lv){
  const vol=rbEff('VOL',lv),res=rbEff('RES',lv);
  const isBucc=state.race==='Buccaneer';
  return{vitDeath:-(vol*(isBucc?4:2)),eneDeath:-res,espDeath:-Math.ceil(vol/2)};
}

function changeRBTarget(delta){
  if(!state.roadBuild)state.roadBuild={targetLevel:state.level,plans:{}};
  state.roadBuild.targetLevel=Math.max(1,Math.min(D.config.MAX_LEVEL,(state.roadBuild.targetLevel||1)+delta));
  renderRoadBuildTable();
}
function resetRoadBuild(){
  if(!confirm('¿Resetear todo el Road Build? Se perderá el plan completo.'))return;
  state.roadBuild={targetLevel:state.roadBuild?.targetLevel||state.level,plans:{}};
  renderRoadBuildTable();
}
function syncRBFromMain(){
  if(!state.roadBuild)state.roadBuild={targetLevel:state.level,plans:{}};
  state.roadBuild.targetLevel=state.level;
  state.roadBuild.plans={};
  const plan={};
  for(const a of D.attrs) plan[a]=state.customAttrs[a]||0;
  state.roadBuild.plans[1]=plan;
  renderRoadBuildTable();
}
function onRBPlanChange(lv,attr,val){
  if(!state.roadBuild)state.roadBuild={targetLevel:state.level,plans:{}};
  if(!state.roadBuild.plans[lv])state.roadBuild.plans[lv]={};
  state.roadBuild.plans[lv][attr]=Math.max(0,parseInt(val)||0);
  renderRoadBuildTable();
}

function renderRoadBuildTable(){
  const planEl=document.getElementById('rbPlannerBody');
  const lvEls=document.querySelectorAll('.rb-target-lv');
  if(!planEl)return;

  if(!state.roadBuild)state.roadBuild={targetLevel:state.level,plans:{}};
  const rb=state.roadBuild;
  const maxLv=Math.min(Math.max(rb.targetLevel||1,1),D.config.MAX_LEVEL);
  lvEls.forEach(el=>el.textContent=maxLv);

  let planRows='';
  for(let lv=1;lv<=maxLv;lv++){
    const paAvail=rbPAAvail(lv);
    const paUsed=rbTotalInvUpTo(lv);
    const paFree=paAvail-paUsed;
    
    const isCurr=lv===state.level;
    const isMile=lv%10===0;
    const freeColor=paFree<0?'#fb7185':paFree===0?'#facc15':'#4ade80';
    const rowCls=isCurr?'rb-current':isMile?'rb-milestone':'';
    const bgSticky=isCurr?'rgba(80,15,35,0.98)':isMile?'rgba(40,30,5,0.96)':'rgba(22,8,14,0.97)';
    const cap=lv*10+50;

    const vit=rbVIT(lv), ene=rbENE(lv), esp=rbESP(lv);

    planRows+=`<tr class="${rowCls}">
      <td class="rb-sticky-col" style="background:${bgSticky};padding:4px 8px;text-align:center;font-weight:700;color:${isCurr?'#F25C8D':isMile?'#facc15':'#8A7F73'};">
        ${isCurr?'★':isMile?'◆':''}${lv}
      </td>
      <td style="padding:3px 5px;text-align:center;font-weight:700;color:${freeColor};font-size:1rem;">${paFree}</td>
      
      ${D.attrs.map(a=>{
        const inputVal = rbGetPAAtLevel(a,lv);
        const auto = rbAutoBase(a,lv);
        const cumPA = rbGetCumulativePA(a,lv);
        const extra = rbGetRaceKarmaExtra(a); 
        const totalEff = auto + cumPA + extra;
        const overCap = (auto + cumPA) > cap;
        
        return `<td style="padding:4px;text-align:center;">
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            <input class="rb-input" type="number" value="${inputVal}" min="0" step="1"

function changeLevel(d){
  state.level=Math.max(1,Math.min(D.config.MAX_LEVEL,state.level+d));
  const cap=getLevelCap();
  for(const a of D.attrs)state.customAttrs[a]=Math.min(state.customAttrs[a]||0,Math.max(0,cap-autoBase(a)));
  let ovr=totalUsed()-(D.config.PA_START+state.level*D.config.PA_PER_LEVEL);
  if(ovr>0)for(const a of D.attrs){if(ovr<=0)break;let r=Math.min(state.customAttrs[a],ovr);state.customAttrs[a]-=r;ovr-=r;}
  renderAll();
}
function onAttrChange(attr,val){
  val=Math.max(0,parseInt(val)||0);
  const cap=getLevelCap(),maxC=Math.max(0,cap-autoBase(attr)),old=state.customAttrs[attr]||0;
  let diff=val-old;
  if(diff>0){const can=Math.min(diff,freePA());val=old+can;}
  state.customAttrs[attr]=Math.min(val,maxC);
  renderAll();
}
function resetAttrs(){for(const a of D.attrs)state.customAttrs[a]=0;renderAll();}
function onPassiveExtra(attr,val){
  if(!state.passiveExtras)state.passiveExtras={FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0};
  state.passiveExtras[attr]=parseInt(val)||0;
  renderAll();
}
function onZoanBonus(attr,val){
  if(!state.zoanBonuses)state.zoanBonuses={FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0};
  state.zoanBonuses[attr]=parseInt(val)||0;
  renderAll();
}
function autoDistribute(){
  const pts=freePA();if(pts<=0)return;
  const each=Math.floor(pts/D.attrs.length),rem=pts%D.attrs.length,cap=getLevelCap();
  for(let i=0;i<D.attrs.length;i++){
    const a=D.attrs[i],mc=Math.max(0,cap-autoBase(a));
    state.customAttrs[a]=Math.min(mc,(state.customAttrs[a]||0)+each+(i<rem?1:0));
  }
  renderAll();
}
function onKarmaToggle(id){state.selectedKarmas[id]=!state.selectedKarmas[id];renderAll();}
function onAkumaChange(type){state.akuma.type=type;renderAll();}
function onHakiChange(){
  state.haki.busho=document.getElementById('hakiBusho')?.checked||false;
  state.haki.ken=document.getElementById('hakiKen')?.checked||false;
  state.haki.haos=document.getElementById('hakiHaos')?.checked||false;
  renderAll();
}
function onWeaponCatChange(selEl){
  const v=(selEl||document.getElementById('weapCat'))?.value;
  if(v)state.weapon.cat=v;
  const subs=D.weapons[state.weapon.cat].subs;
  state.weapon.sub=Object.keys(subs)[0];
  state.weapon.tier=0;
  renderAll();
}
function onWeaponDetailChange(selEl){
  const st=(selEl&&selEl.value?selEl.value:document.getElementById('weapTier')?.value||'').split('|');
  if(st&&st.length===2){state.weapon.sub=st[0];state.weapon.tier=parseInt(st[1]);}
  state.weapon.mode=document.getElementById('weapMode')?.value||'normal';
  state.weapon.shield=document.getElementById('weapShield')?.value||'no';
  renderAll();
}
function onOficioToggle(k){if(!state.oficios[k])state.oficios[k]={level:0,spec1:0,spec2:0,super:false};state.oficios[k].level=state.oficios[k].level>0?0:1;renderAll();}
function onOficioLevel(k,v){if(!state.oficios[k])state.oficios[k]={level:0,spec1:0,spec2:0,super:false};state.oficios[k].level=parseInt(v)||1;renderAll();}
function onOficioSpec(k,i,v){if(!state.oficios[k])state.oficios[k]={level:0,spec1:0,spec2:0,super:false};state.oficios[k]['spec'+i]=parseInt(v)||0;renderAll();}
function onOficioSuper(k,c){if(!state.oficios[k])state.oficios[k]={level:0,spec1:0,spec2:0,super:false};state.oficios[k].super=c;renderAll();}
function addMaestria(){state.masteries.push({type:'Cuerpo a Cuerpo',grade:1});renderAll();}
function updMaestriaType(i,v){state.masteries[i].type=v;renderAll();}
function updMaestriaGrade(i,g){state.masteries[i].grade=g;renderAll();}
function delMaestria(i){state.masteries.splice(i,1);renderAll();}
function onNameChange(v){state.name=v;}

function renderVitals(){
  const vit=calcVIT(),ene=calcENE(),esp=calcESP(),nv=state.level;
  const zR=getAkumaRegen();
  document.querySelectorAll('#barVIT').forEach(el=>el.textContent=vit.toLocaleString());
  document.querySelectorAll('#barENE').forEach(el=>el.textContent=ene.toLocaleString());
  document.querySelectorAll('#barESP').forEach(el=>el.textContent=esp.toLocaleString());
  const vitRegenStr=zR.c>0?`Combate: +${zR.c}/turno | Fuera: +${zR.f}/turno`:'Sin regeneración (salvo habilidad especial)';
  document.querySelectorAll('#regenVIT').forEach(el=>el.textContent=vitRegenStr);
  const eneBase=getBaseEneRegen();
  const eneR=getZoanEneRegen(nv);
  const eneRegenStr=state.akuma.type.startsWith('zoan')?`Combate: +${eneR.c}/t | Fuera: +${eneR.f}/t`:`Combate: +${eneBase}/turno | Fuera: +${eneBase*2}/turno`;
  document.querySelectorAll('#regenENE').forEach(el=>el.textContent=eneRegenStr);
  const espR=getBaseEspRegen();
  document.querySelectorAll('#regenESP').forEach(el=>el.textContent=`Combate: +${espR.toFixed(1)} | Fuera: +${(getEff('CH')/4).toFixed(1)}`);

  const um=document.getElementById('umbralesPanel');
  if(um){
    const umVals=calcUmbralesDolorValues();
    const effects=['Interrumpe acciones que requieran concentración','Interrumpe concentración y cargas','Interrumpe TODAS las acciones y técnicas con mantenimiento','Corta Haki + Desorientación/Confusión 3 seg.','Corta transformaciones Akuma no Mi'];
    const vol=getEff('VOL');

    const isBucc=state.race==='Buccaneer';

    if(isBucc){buccBonus=150;if(state.level>=10)buccBonus+=300;if(state.level>=25)buccBonus+=500;}

function renderAttrPanel(){
  const panel=document.getElementById('attrPanel');if(!panel)return;
  panel.innerHTML='';
  const cap=getLevelCap();
  for(const attr of D.attrs){
    const meta=D.attrMeta[attr],auto=autoBase(attr),cv=cval(attr),rb=getRaceBonus(attr),km=getKarmaMod(attr);
    const pe=getPExtra(attr);
    const total=(auto+cv)+rb+km+pe;
    const div=document.createElement('div');
    div.className='attr-card';
    let extText='';
    if(rb!==0||km!==0)extText+=` Raza/Karma:${(rb+km)>0?'+':''}${rb+km}`;
    if(pe!==0)extText+=` Extra:${pe>0?'+':''}${pe}`;
    div.innerHTML=`<div class="attr-icon">${meta.emoji}</div>
      <div class="attr-name" data-tip="${meta.desc}\n\nFórmula: Auto + PA + Raza + Karma + Extras\n= ${auto}+${cv}+${rb}+${km}+${pe} = ${total}\n\nAuto aumenta ${D.config.AUTO_PER_LEVEL}/nivel">${attr}</div>
      <div class="attr-breakdown">
        <div>Auto: ${auto} | PA: ${cv}</div>
        <div>Cap PA: ${auto+cv}/${cap}${extText}</div>
      </div>
      <div class="attr-total">${total}</div>
      <div class="attr-controls">
        <button class="attr-btn" onclick="onAttrChange('${attr}',${cv}-1)"><i class="fas fa-minus"></i></button>
        <input class="attr-input" type="number" value="${cv}" onchange="onAttrChange('${attr}',this.value)">
        <button class="attr-btn" onclick="onAttrChange('${attr}',${cv}+1)"><i class="fas fa-plus"></i></button>

    panel.appendChild(div);
  }

  const pure=document.getElementById('raceGridPure'),hyb=document.getElementById('raceGridHybrid');

  for(const[name,data]of Object.entries(D.races)){

    const tags=Object.entries(data.bonuses).map(([k,v])=>`<span class="stat-tag ${v>0?'pos':'neg'}">${v>0?'+':''}${v} ${k}</span>`).join(' ');

      <div class="info-row"><span class="info-key" data-tip="Nivel medio: 1m radio por cada 10 pts Atributo Ken">Radio Medio (radio)</span><span class="info-val good">${rnd(kAtr/10)} m</span></div>`],
    ['cardHaos',state.haki.haos,'var(--stat-magic)','haosStats',`
      <div class="info-row"><span class="info-key">Experiencia (CH×3+VOL×2)</span><span class="info-val">${hExp}</span></div>
      <div class="info-row"><span class="info-key">Nivel</span><span class="info-val">${tier(hExp)}</span></div>
      <div class="info-row"><span class="info-key" data-tip="Atributo = CH + VOL.">Atributo Haoshoku</span><span class="info-val" style="color:var(--stat-magic)">${hAtr}</span></div>
      <div class="info-row"><span class="info-key" data-tip="Nivel base: 1m por cada 10 pts">Radio Base</span><span class="info-val good">${rnd(hAtr/10)} m</span></div>

function renderKarmas(){
  const pos=document.getElementById('karmaListPos'),neg=document.getElementById('karmaListNeg');

  const search=(document.getElementById('karmaSearch')?.value||'').toLowerCase();
  pos.innerHTML='';neg.innerHTML='';
  for(const k of D.karmasPos){
    if(search&&!k.name.toLowerCase().includes(search)&&!k.effect.toLowerCase().includes(search))continue;
    const sel=state.selectedKarmas[k.id];
    const d=document.createElement('div');
    d.className='list-item '+(sel?'sel-pos':'');
    d.innerHTML=`<div><div class="list-title">${k.name}</div><div class="list-desc">${k.effect}</div></div><div style="font-family:var(--font-mono);font-weight:bold;color:var(--stat-good);flex-shrink:0;margin-left:8px;">+${k.val}</div>`;
    d.onclick=()=>onKarmaToggle(k.id);
    pos.appendChild(d);
  }
  for(const k of D.karmasNeg){
    if(search&&!k.name.toLowerCase().includes(search)&&!k.effect.toLowerCase().includes(search))continue;
    const sel=state.selectedKarmas[k.id];
    const d=document.createElement('div');
    d.className='list-item '+(sel?'sel-neg':'');
    d.innerHTML=`<div><div class="list-title">${k.name}</div><div class="list-desc">${k.effect}</div></div><div style="font-family:var(--font-mono);font-weight:bold;color:var(--stat-bad);flex-shrink:0;margin-left:8px;">${k.val}</div>`;

}

  const bal=getKarmaBalance();
  const hakiList=[state.haki.busho&&'Busoshoku',state.haki.ken&&'Kenbunshoku',state.haki.haos&&'Haoshoku'].filter(Boolean).join(', ')||'Ninguno';
  const mastList=state.masteries.map(m=>`${m.type} (G${m.grade})`).join(', ')||'Ninguna';

function copyBBCode(){
  const text=document.getElementById('bbcodeText')?.textContent||'';
  navigator.clipboard.writeText(text).then(()=>{
    document.querySelectorAll('#bbcodeBtn').forEach(btn=>{btn.classList.add('copied');btn.innerHTML='<i class="fas fa-check"></i> Copiado!';});
    setTimeout(()=>{document.querySelectorAll('#bbcodeBtn').forEach(btn=>{btn.classList.remove('copied');btn.innerHTML='<i class="fas fa-copy"></i> Copiar BBCode';});},2000);
  });
}

// ============================================================
// RADAR
// ============================================================
function drawRadar(){
  const canvas=document.getElementById('statRadar');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const cx=canvas.width/2,cy=canvas.height/2,radius=Math.min(cx,cy)-22;
  const vals=D.radarAttrs.map(a=>getEff(a));
  const maxVal=Math.max(getLevelCap(),...vals);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const rs=getComputedStyle(document.documentElement);
  const cBorder=rs.getPropertyValue('--panel-border-bright').trim();
  const cText=rs.getPropertyValue('--text-bright').trim();
  const cAccent=rs.getPropertyValue('--accent-primary').trim();
  const cAlpha=rs.getPropertyValue('--accent-alpha').trim();
  const N=D.radarAttrs.length;
  ctx.strokeStyle=cBorder;ctx.lineWidth=1;
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    for(let i=0;i<N;i++){
      const a=(Math.PI*2/N)*i-Math.PI/2,r=radius*(lv/4);
      if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
      else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    ctx.closePath();ctx.stroke();
  }
  ctx.fillStyle=cText;ctx.font='bold 9px "JetBrains Mono"';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<N;i++){
    const a=(Math.PI*2/N)*i-Math.PI/2;
    ctx.strokeStyle=cBorder;ctx.beginPath();
    ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*radius,cy+Math.sin(a)*radius);ctx.stroke();
    ctx.fillText(D.radarAttrs[i],cx+Math.cos(a)*(radius+14),cy+Math.sin(a)*(radius+14));
  }
  ctx.beginPath();ctx.strokeStyle=cAccent;ctx.lineWidth=2;ctx.fillStyle=cAlpha;
  for(let i=0;i<N;i++){
    const a=(Math.PI*2/N)*i-Math.PI/2,r=radius*Math.min(vals[i]/maxVal,1);
    if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle=cAccent;
  for(let i=0;i<N;i++){
    const a=(Math.PI*2/N)*i-Math.PI/2,r=radius*Math.min(vals[i]/maxVal,1);
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
  }
}

// ============================================================
// TABS / THEME / IO
// ============================================================
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-'+id);
  if(el)el.classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='resumen')renderResumen();
  if(id==='roadbuild')renderRoadBuildTable();
  setTimeout(drawRadar,50);
}

function toggleTheme(){
  const html=document.documentElement;
  const next=html.getAttribute('data-theme')==='rosa'?'azul':'rosa';
  html.setAttribute('data-theme',next);
  setTimeout(drawRadar,100);
}

let ioMode='export';
function openModal(mode){
  ioMode=mode;
  document.getElementById('ioModal').classList.add('open');
  const ta=document.getElementById('ioDataText');
  const title=document.getElementById('ioModalTitle');
  if(mode==='export'){
    title.innerHTML='<i class="fas fa-file-export"></i> Exportar Personaje';
    const s={...state,name:document.getElementById('charName')?.value||state.name};
    ta.value=JSON.stringify(s,null,2);ta.readOnly=true;
    document.getElementById('ioActionBtn').innerHTML='<i class="fas fa-copy"></i> Copiar';
  }else{
    title.innerHTML='<i class="fas fa-file-import"></i> Importar Personaje';
    ta.value='';ta.readOnly=false;ta.placeholder='Pega el JSON exportado...';
    document.getElementById('ioActionBtn').innerHTML='<i class="fas fa-check"></i> Cargar';
  }
}

function closeModal(){document.getElementById('ioModal').classList.remove('open');}

function executeIO(){
  if(ioMode==='export'){
    navigator.clipboard.writeText(document.getElementById('ioDataText').value);
    alert('JSON copiado al portapapeles!');
  }else{
    try{
      const p=JSON.parse(document.getElementById('ioDataText').value);
      if(!p.passiveExtras)p.passiveExtras={FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0};
      if(!p.combatCalc)p.combatCalc={transformation:'humano',style:'desarmado'};
      if(!p.zoanBonuses)p.zoanBonuses={FUE:0,RES:0,DES:0,PRE:0,AGI:0,REF:0,INT:0,VOL:0,CH:0,CA:0};
      if(!p.roadBuild)p.roadBuild={targetLevel:p.level||1,plans:{}};
      // Eliminar técnicas si vienen de un JSON antiguo
      delete p.tecnicas;
      Object.assign(state,p);
      closeModal();
      buildLayout();
      renderAll();
    }catch(e){alert('JSON inválido.');}
  }
}

// ============================================================
// INIT
// ============================================================
async function init(){
  try{
    const url='https://cdn.jsdelivr.net/gh/cuentapararol12-beep/nakama@abc983231bf4d2a24c1b84f441f9af1dae104b83/Data.json';
    const response=await fetch(url);
    if(!response.ok)throw new Error(`Error HTTP: ${response.status}`);
    D=await response.json();
    buildLayout();
    renderAll();
  }catch(error){
    console.error('Error detallado:',error);
    document.getElementById('layoutWrapper').innerHTML=`
      <div style="text-align:center;margin-top:50px;padding:20px;">
        <h3 style="color:var(--stat-bad);margin-bottom:10px;">Error al cargar el Data.json</h3>
        <p style="color:var(--text-muted);font-family:var(--font-mono);">${error.message}</p>
        <p style="color:var(--stat-warn);font-size:0.8rem;margin-top:15px;">Pulsa F12 → Consola para ver el error exacto.</p>
      </div>`;
  }
}

init();
